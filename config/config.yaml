server:
  port: 8080
  read_timeout: 5
  write_timeout: 10
  idle_timeout: 60

mysql:
  host: 127.0.0.1
  port: 3306
  username: gobiz
  password: "123456"
  database: go_business
  charset: utf8mb4
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600
  slow_threshold: 200
  log_level: warn

redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  db: 0
  pool_size: 20
  min_idle_conns: 5
  dial_timeout: 5
  read_timeout: 3
  write_timeout: 3

rate_limit:
  enabled: true
  fail_open : true
  algorithm: token_bucket
  default:
    capacity: 20
    rate: 5
  
  skip_paths:
    - /api/v1/health

  rules:
    - path: /api/v1/user/register
      capacity: 3
      rate: 0.2

    - path: /api/v1/user/list
      capacity: 10
      rate: 2

    - path: /api/v1/user/delete
      capacity: 5
      rate: 1